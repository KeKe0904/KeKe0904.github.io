<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>API 全能力测试 · 毛玻璃黑白版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(20, 20, 20, 0.5);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --blur-amount: 16px;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #888;
      --surface-light: rgba(255, 255, 255, 0.06);
      --surface-lighter: rgba(255, 255, 255, 0.1);
      --accent: #ffffff;
      --accent-dim: #cccccc;
      --success: #7ee081;
      --danger: #ff8a80;
      --warning: #ffd54f;
      --info: #90caf9;
      --radius: 18px;
      --radius-sm: 12px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at 20% 20%, #1a1a1a 0%, #0a0a0a 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* 毛玻璃容器 */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
      transition: all var(--transition);
    }

    .glass-panel:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .container {
      max-width: 1200px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.2rem 1.8rem;
      backdrop-filter: blur(18px);
      background: rgba(15, 15, 15, 0.55);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .logo-text h1 {
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .logo-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    .badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 2fr auto;
      gap: 1rem;
      align-items: end;
      padding: 1.8rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-field {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      color: #f0f0f0;
      font-family: var(--font-mono);
      transition: all var(--transition);
      backdrop-filter: blur(4px);
      width: 100%;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .input-field::placeholder {
      color: #777;
      font-family: inherit;
    }

    /* Buttons */
    .btn {
      padding: 0.75rem 1.4rem;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: #f0f0f0;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-primary {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(30%);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .btn-outline:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }

    .btn-sm {
      padding: 0.4rem 0.9rem;
      font-size: 0.75rem;
      border-radius: 10px;
    }

    .btn-xs {
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      border-radius: 8px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ccc;
      transition: all var(--transition);
    }

    .btn-icon:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* Model tags */
    .model-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      padding: 1rem 1.8rem;
      max-height: 220px;
      overflow-y: auto;
    }

    .model-tag {
      padding: 0.45rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      color: #ccc;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      backdrop-filter: blur(4px);
    }

    .model-tag.selected {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }

    .model-tag .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      transition: 0.2s;
    }

    .model-tag.selected .dot {
      background: #fff;
      box-shadow: 0 0 8px #fff;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.8rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* Progress */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex: 1;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      flex: 1;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #888, #ccc);
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      min-width: 70px;
      text-align: right;
      font-weight: 500;
    }

    /* Summary cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      padding: 1rem 1.8rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    /* Results table */
    .table-container {
      overflow-x: auto;
      padding: 1rem 1.8rem;
      -webkit-overflow-scrolling: touch;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      min-width: 900px;
    }

    .results-table th {
      text-align: left;
      padding: 0.7rem 0.8rem;
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }

    .results-table td {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #ccc;
      vertical-align: middle;
    }

    .model-name-cell {
      font-weight: 600;
      color: #eee;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
    }

    .status-pass { background: rgba(126, 224, 129, 0.15); color: #a5d6a7; }
    .status-fail { background: rgba(255, 138, 128, 0.15); color: #ef9a9a; }
    .status-warn { background: rgba(255, 213, 79, 0.1); color: #ffe082; }

    .clickable {
      cursor: pointer;
      color: #bbb;
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    .clickable:hover { color: #fff; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    .modal-content {
      background: rgba(30,30,30,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 1.8rem;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      color: #ddd;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }

    .modal-content pre {
      background: rgba(0,0,0,0.5);
      padding: 1rem;
      border-radius: 12px;
      font-size: 0.7rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: var(--font-mono);
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast-area {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      padding: 0.8rem 1.4rem;
      border-radius: 14px;
      background: rgba(20,20,20,0.8);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #eee;
      font-size: 0.8rem;
      font-weight: 500;
      animation: slideIn 0.3s ease, fadeOutToast 0.3s 2.5s forwards;
      pointer-events: auto;
    }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOutToast {
      to { opacity: 0; transform: translateY(-10px); }
    }

    /* Mobile */
    @media (max-width: 768px) {
      body { padding: 0.8rem; }
      .form-grid { grid-template-columns: 1fr; }
      .header { padding: 1rem; }
      .model-cloud { max-height: 180px; }
      .results-table { font-size: 0.7rem; }
      .btn { padding: 0.65rem 1.1rem; font-size: 0.8rem; }
    }

    @media (max-width: 500px) {
      .action-row { flex-direction: column; align-items: stretch; }
      .progress-wrap { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="glass-panel header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">
          <h1>API 全能力测试</h1>
          <span>非流式 · 流式 · 工具调用</span>
        </div>
      </div>
      <div class="badge">OpenAI 兼容</div>
    </div>

    <!-- Config -->
    <div class="glass-panel">
      <div class="form-grid">
        <div class="input-group">
          <label>🔗 API Base URL</label>
          <input class="input-field" id="apiUrl" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
        </div>
        <div class="input-group">
          <label>🔑 API Key</label>
          <input class="input-field" type="password" id="apiKey" placeholder="sk-...">
        </div>
        <button class="btn btn-primary" id="btnFetchModels" onclick="fetchModels()">📋 获取模型</button>
      </div>
    </div>

    <!-- Models -->
    <div class="glass-panel" id="modelsCard" style="display:none;">
      <div class="action-row">
        <span style="font-weight:500;color:#ccc;" id="modelCountLabel">模型列表</span>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" onclick="selectAllModels()">全选</button>
          <button class="btn btn-outline btn-sm" onclick="deselectAllModels()">取消</button>
          <button class="btn btn-outline btn-sm" onclick="invertSelection()">反选</button>
        </div>
      </div>
      <div class="model-cloud" id="modelsContainer"></div>
    </div>

    <!-- Control -->
    <div class="glass-panel" id="testControlCard" style="display:none;">
      <div class="action-row">
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span class="progress-label" id="progressLabel">就绪</span>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-primary" id="btnStart" onclick="startAllTests()">🚀 开始测试</button>
          <button class="btn btn-outline btn-sm" id="btnStop" onclick="stopAllTests()" disabled>⏹️ 停止</button>
          <button class="btn btn-outline btn-sm" onclick="clearResults()">🗑️ 清除</button>
        </div>
      </div>
      <div style="padding:0.5rem 1.8rem;display:flex;gap:1.5rem;font-size:0.75rem;color:#aaa;flex-wrap:wrap;">
        <span>⏱ 超时 <input class="input-field" id="timeoutSec" type="number" value="45" min="5" style="width:60px;padding:0.3rem;text-align:center;"> 秒</span>
        <span>⚡ 并发 <input class="input-field" id="concurrency" type="number" value="2" min="1" max="8" style="width:50px;padding:0.3rem;text-align:center;"></span>
      </div>
    </div>

    <!-- Summary -->
    <div class="glass-panel" id="summaryCard" style="display:none;">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="sumTotal">0</div><div class="stat-label">总测试</div></div>
        <div class="stat-card"><div class="stat-value" id="sumPass" style="color:#a5d6a7;">0</div><div class="stat-label">通过</div></div>
        <div class="stat-card"><div class="stat-value" id="sumFail" style="color:#ef9a9a;">0</div><div class="stat-label">失败</div></div>
        <div class="stat-card"><div class="stat-value" id="sumModels" style="color:#eee;">0</div><div class="stat-label">模型</div></div>
      </div>
    </div>

    <!-- Results -->
    <div class="glass-panel" id="resultsCard" style="display:none;">
      <div class="table-container">
        <table class="results-table">
          <thead>
            <tr>
              <th>模型</th>
              <th>非流式</th>
              <th>耗时</th>
              <th>Token</th>
              <th>流式</th>
              <th>首字节</th>
              <th>总耗时</th>
              <th>工具调用</th>
              <th>耗时</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-area" id="toastArea"></div>

  <script>
    (function() {
      // 状态
      const state = {
        models: [],
        results: {},
        running: false,
        totalTests: 0,
        completed: 0
      };

      // DOM 工具
      const $ = (s) => document.querySelector(s);
      const $$ = (s) => document.querySelectorAll(s);

      // 元素
      const apiUrlInp = $('#apiUrl');
      const apiKeyInp = $('#apiKey');
      const modelsCard = $('#modelsCard');
      const modelsContainer = $('#modelsContainer');
      const modelCountLabel = $('#modelCountLabel');
      const testControlCard = $('#testControlCard');
      const progressFill = $('#progressFill');
      const progressLabel = $('#progressLabel');
      const btnStart = $('#btnStart');
      const btnStop = $('#btnStop');
      const summaryCard = $('#summaryCard');
      const resultsCard = $('#resultsCard');
      const resultsBody = $('#resultsBody');
      const sumTotal = $('#sumTotal');
      const sumPass = $('#sumPass');
      const sumFail = $('#sumFail');
      const sumModels = $('#sumModels');
      const toastArea = $('#toastArea');
      const timeoutSecInp = $('#timeoutSec');
      const concurrencyInp = $('#concurrency');

      function showToast(msg, type='info') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toastArea.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      function normalizeUrl(url) {
        let u = url.trim().replace(/\/+$/, '');
        if (!u.endsWith('/v1')) u += '/v1';
        return u;
      }

      async function fetchModels() {
        const rawUrl = apiUrlInp.value.trim();
        const key = apiKeyInp.value.trim();
        if (!rawUrl || !key) return showToast('请输入URL和Key', 'error');
        const base = normalizeUrl(rawUrl);
        const btn = $('#btnFetchModels');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 获取中';
        try {
          const resp = await fetch(base + '/models', {
            headers: { 'Authorization': `Bearer ${key}` }
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          let list = [];
          if (data?.data) list = data.data.map(m => m.id || m);
          else if (Array.isArray(data)) list = data.map(m => m.id || m);
          state.models = [...new Set(list.filter(Boolean))].map(id => ({ id, selected: true }));
          renderModelTags();
          modelsCard.style.display = '';
          testControlCard.style.display = '';
          modelCountLabel.textContent = `模型列表 (${state.models.length})`;
          showToast(`获取到 ${state.models.length} 个模型`, 'success');
        } catch (e) {
          showToast('获取失败: ' + e.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '📋 获取模型';
        }
      }

      function renderModelTags() {
        modelsContainer.innerHTML = state.models.map((m,i) => `
          <div class="model-tag ${m.selected ? 'selected' : ''}" onclick="toggleModel(${i})">
            <span class="dot"></span>${escapeHtml(m.id)}
          </div>`).join('');
      }

      window.toggleModel = (i) => {
        state.models[i].selected = !state.models[i].selected;
        renderModelTags();
      };
      window.selectAllModels = () => { state.models.forEach(m => m.selected=true); renderModelTags(); };
      window.deselectAllModels = () => { state.models.forEach(m => m.selected=false); renderModelTags(); };
      window.invertSelection = () => { state.models.forEach(m => m.selected=!m.selected); renderModelTags(); };

      function getSelected() { return state.models.filter(m=>m.selected).map(m=>m.id); }

      function updateProgress() {
        const pct = state.totalTests ? Math.round((state.completed/state.totalTests)*100) : 0;
        progressFill.style.width = pct + '%';
        progressLabel.textContent = `${state.completed}/${state.totalTests}`;
      }

      async function callNonStream(base, key, model, timeout) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout*1000);
        const start = performance.now();
        try {
          const resp = await fetch(base+'/chat/completions', {
            method:'POST',
            headers: {'Authorization':`Bearer ${key}`, 'Content-Type':'application/json'},
            body: JSON.stringify({model, messages:[{role:'user',content:'你好，用一句话介绍自己'}], stream:false, max_tokens:100}),
            signal: controller.signal
          });
          clearTimeout(id);
          const elapsed = performance.now()-start;
          if (!resp.ok) {
            const errText = await resp.text().catch(()=>'');
            return { success:false, elapsed, error:`${resp.status} ${resp.statusText}`, detail: errText };
          }
          const data = await resp.json();
          const usage = data.usage || {};
          return { success:true, elapsed, content: data.choices?.[0]?.message?.content, usage };
        } catch(e) {
          clearTimeout(id);
          return { success:false, elapsed:performance.now()-start, error:e.name==='AbortError'?'超时':e.message };
        }
      }

      async function callStream(base, key, model, timeout) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout*1000);
        const start = performance.now();
        let firstByte = null, content='', chunks=0;
        try {
          const resp = await fetch(base+'/chat/completions', {
            method:'POST',
            headers: {'Authorization':`Bearer ${key}`, 'Content-Type':'application/json'},
            body: JSON.stringify({model, messages:[{role:'user',content:'一句话介绍人工智能'}], stream:true, max_tokens:100}),
            signal: controller.signal
          });
          if (!resp.ok) {
            clearTimeout(id);
            const errText = await resp.text().catch(()=>'');
            return { success:false, elapsed:performance.now()-start, error:`${resp.status}`, detail:errText };
          }
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          while(true) {
            const {done, value} = await reader.read();
            if (done) break;
            if (!firstByte) firstByte = performance.now()-start;
            buffer += decoder.decode(value, {stream:true});
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data:')) continue;
              const d = line.slice(5).trim();
              if (d === '[DONE]') continue;
              try { const j = JSON.parse(d); const c = j.choices?.[0]?.delta?.content; if(c) content+=c; chunks++; } catch{}
            }
          }
          clearTimeout(id);
          return { success:true, elapsed:performance.now()-start, firstByte, content, chunks };
        } catch(e) {
          clearTimeout(id);
          return { success:false, elapsed:performance.now()-start, firstByte, error:e.name==='AbortError'?'超时':e.message };
        }
      }

      async function callTool(base, key, model, timeout) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout*1000);
        const start = performance.now();
        try {
          const resp = await fetch(base+'/chat/completions', {
            method:'POST',
            headers: {'Authorization':`Bearer ${key}`, 'Content-Type':'application/json'},
            body: JSON.stringify({model, messages:[{role:'user',content:'北京天气如何？'}], tools:[{type:'function',function:{name:'get_weather',parameters:{type:'object',properties:{city:{type:'string'}},required:['city']}}}], tool_choice:'auto', stream:false}),
            signal: controller.signal
          });
          clearTimeout(id);
          const elapsed = performance.now()-start;
          if (!resp.ok) {
            const errText = await resp.text().catch(()=>'');
            return { success:false, elapsed, error:`${resp.status}`, detail:errText };
          }
          const data = await resp.json();
          const hasTools = !!data.choices?.[0]?.message?.tool_calls;
          return { success:true, elapsed, hasTools, usage: data.usage, content: data.choices?.[0]?.message?.content };
        } catch(e) {
          clearTimeout(id);
          return { success:false, elapsed:performance.now()-start, error:e.name==='AbortError'?'超时':e.message };
        }
      }

      function renderRow(model, res) {
        const non = res.nonStream || {};
        const str = res.stream || {};
        const tool = res.toolCall || {};
        const tokenInfo = non.usage ? `${non.usage.total_tokens||'?'} tokens` : '—';
        const detailId = `detail-${model.replace(/[^a-zA-Z0-9]/g,'')}`;
        return `
          <tr>
            <td class="model-name-cell">${escapeHtml(model)}</td>
            <td>${non.success ? '<span class="status-badge status-pass">✔</span>' : '<span class="status-badge status-fail">✘</span>'}</td>
            <td>${non.elapsed ? (non.elapsed/1000).toFixed(1)+'s' : '—'}</td>
            <td>${tokenInfo}</td>
            <td>${str.success ? '<span class="status-badge status-pass">✔</span>' : '<span class="status-badge status-fail">✘</span>'}</td>
            <td>${str.firstByte ? (str.firstByte/1000).toFixed(2)+'s' : '—'}</td>
            <td>${str.elapsed ? (str.elapsed/1000).toFixed(1)+'s' : '—'}</td>
            <td>${tool.success ? (tool.hasTools ? '<span class="status-badge status-pass">✔ 工具</span>' : '<span class="status-badge status-warn">⚠ 无</span>') : '<span class="status-badge status-fail">✘</span>'}</td>
            <td>${tool.elapsed ? (tool.elapsed/1000).toFixed(1)+'s' : '—'}</td>
            <td><span class="clickable" onclick="showDetail('${escapeHtml(model)}')">🔍</span></td>
          </tr>`;
      }

      window.showDetail = (model) => {
        const res = state.results[model];
        if (!res) return;
        const detail = { model, nonStream: res.nonStream, stream: res.stream, toolCall: res.toolCall };
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal-content">
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
            <h3 style="margin-top:0;">${escapeHtml(model)} 详情</h3>
            <pre>${escapeHtml(JSON.stringify(detail, null, 2))}</pre>
            <button class="btn btn-sm btn-outline" style="margin-top:1rem;" onclick="navigator.clipboard.writeText(\`${JSON.stringify(detail, null, 2).replace(/`/g,'\\`')}\`)">复制 JSON</button>
          </div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
      };

      function updateSummary() {
        let total=0, pass=0, fail=0, models=new Set();
        for (const [m, res] of Object.entries(state.results)) {
          models.add(m);
          for (const key of ['nonStream','stream','toolCall']) {
            if (res[key]) { total++; res[key].success ? pass++ : fail++; }
          }
        }
        sumTotal.textContent = total;
        sumPass.textContent = pass;
        sumFail.textContent = fail;
        sumModels.textContent = models.size;
        if (total) summaryCard.style.display = '';
      }

      async function startAllTests() {
        if (state.running) return;
        const selected = getSelected();
        if (!selected.length) return showToast('请选择模型');
        const base = normalizeUrl(apiUrlInp.value.trim());
        const key = apiKeyInp.value.trim();
        if (!base || !key) return showToast('配置不完整');
        const timeout = parseInt(timeoutSecInp.value)||45;
        const concurrency = parseInt(concurrencyInp.value)||2;

        state.running = true;
        state.results = {};
        state.totalTests = selected.length*3;
        state.completed = 0;
        updateProgress();
        btnStart.disabled = true;
        btnStop.disabled = false;
        resultsCard.style.display = '';
        resultsBody.innerHTML = selected.map(m => renderRow(m, {})).join('');
        updateSummary();

        const queue = [...selected];
        const workers = new Set();
        async function process() {
          while (queue.length && state.running) {
            const model = queue.shift();
            const p = (async () => {
              const res = { nonStream: null, stream: null, toolCall: null };
              res.nonStream = await callNonStream(base, key, model, timeout);
              state.completed++; updateProgress(); state.results[model] = res; refreshRow(model);
              if (!state.running) return;
              res.stream = await callStream(base, key, model, timeout);
              state.completed++; updateProgress(); state.results[model] = res; refreshRow(model);
              if (!state.running) return;
              res.toolCall = await callTool(base, key, model, timeout);
              state.completed++; updateProgress(); state.results[model] = res; refreshRow(model);
            })().finally(() => workers.delete(p));
            workers.add(p);
            if (workers.size >= concurrency) await Promise.race(workers);
          }
          await Promise.all(workers);
        }
        try { await process(); } catch(e){}
        state.running = false;
        btnStart.disabled = false;
        btnStop.disabled = true;
        updateProgress();
        updateSummary();
        showToast('测试完成', 'success');
      }

      function refreshRow(model) {
        const res = state.results[model];
        if (!res) return;
        const row = resultsBody.querySelector(`tr[data-model="${model.replace(/"/g,'&quot;')}"]`);
        if (row) row.outerHTML = renderRow(model, res);
        else resultsBody.insertAdjacentHTML('beforeend', renderRow(model, res));
        updateSummary();
      }

      window.stopAllTests = () => { state.running = false; btnStop.disabled = true; btnStart.disabled = false; };

      window.clearResults = () => {
        state.results = {};
        state.totalTests = 0;
        state.completed = 0;
        updateProgress();
        resultsBody.innerHTML = '';
        resultsCard.style.display = 'none';
        summaryCard.style.display = 'none';
      };

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      window.fetchModels = fetchModels;
      window.startAllTests = startAllTests;
    })();
  </script>
</body>
</html>

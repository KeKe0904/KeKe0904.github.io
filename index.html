<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>API 能力监控 · nonwaste.cn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --green: #4caf84;
      --red: #e0555c;
      --yellow: #d4a853;
      --text-primary: #f2f2f2;
      --text-secondary: #b0b0b0;
      --surface: rgba(18, 20, 22, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    }
    body {
      font-family: var(--font-sans);
      background: #0a0c0e;
      background-image: url('https://t.alcy.cc/ycy');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1300px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    /* 毛玻璃卡片 */
    .card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: box-shadow 0.3s;
    }
    .card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo h1 {
      font-size: 1.2rem;
      font-weight: 550;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #eee;
    }
    .status-led {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,
      100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }
    .clock {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: #ccc;
    }
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 600;
      color: #ddd;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    /* 模型状态条 */
    .model-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .model-chip {
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #bbb;
      transition: 0.2s;
    }
    .model-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .model-chip.green {
      border-color: rgba(76, 175, 132, 0.4);
      color: #a5d6a7;
    }
    .model-chip.green .dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    .model-chip.yellow {
      border-color: rgba(212, 168, 83, 0.5);
      color: #dbb862;
    }
    .model-chip.yellow .dot {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }
    .model-chip.red {
      border-color: rgba(224, 85, 92, 0.5);
      color: #e88488;
    }
    .model-chip.red .dot {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }
    /* 表格 */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.3rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.7rem;
      font-weight: 500;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      white-space: nowrap;
    }
    td {
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #ccc;
    }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 14px;
      font-size: 0.65rem;
      font-weight: 500;
    }
    .badge.pass {
      background: rgba(76, 175, 132, 0.15);
      color: #8fdda0;
    }
    .badge.fail {
      background: rgba(224, 85, 92, 0.2);
      color: #e88488;
    }
    .badge.limit {
      background: rgba(212, 168, 83, 0.2);
      color: #dbb862;
    }
    .badge.warn {
      background: rgba(212, 168, 83, 0.1);
      color: #dbb862;
    }
    .clickable {
      cursor: pointer;
      color: #aaa;
      font-size: 0.75rem;
      text-decoration: underline;
      text-decoration-style: dotted;
    }
    .clickable:hover {
      color: #fff;
    }
    .small {
      font-size: 0.7rem;
      color: #888;
    }
    @media (max-width: 700px) {
      body {
        padding: 0.8rem;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="card header">
      <div class="logo">
        <h1><span class="status-led"></span> API 能力监控</h1>
      </div>
      <div class="clock" id="liveClock">--</div>
    </div>

    <!-- 汇总统计 -->
    <div class="card">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="sumTotal">0</div><div class="stat-label">总测试</div></div>
        <div class="stat-card"><div class="stat-value" id="sumPass" style="color:#8fdda0;">0</div><div class="stat-label">通过</div></div>
        <div class="stat-card"><div class="stat-value" id="sumFail" style="color:#e88488;">0</div><div class="stat-label">失败</div></div>
        <div class="stat-card"><div class="stat-value" id="sumLimit" style="color:#dbb862;">0</div><div class="stat-label">限流</div></div>
      </div>
    </div>

    <!-- 模型状态 -->
    <div class="card">
      <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:0.8rem; display:flex; gap:1rem; align-items:center;">
        <span>模型实时状态</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--green);"></span>可用</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--yellow);"></span>限流</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--red);"></span>不可用</span>
      </div>
      <div class="model-bar" id="modelStatusList"></div>
    </div>

    <!-- 结果表格 -->
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>模型</th><th>非流式</th><th>耗时</th><th>流式</th><th>首字节</th><th>总耗时</th><th>工具调用</th><th>耗时</th><th>详情</th></tr>
          </thead>
          <tbody id="resultsBody"><tr><td colspan="9" style="text-align:center;color:#555;">等待首次测试...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 固定配置
      const API_BASE = 'https://nonwaste.cn/v1';
      const API_KEY = 'sk-gdl1Y5dVRU2CtPD1wigccNgN9MYcB26FKVKFODXN6fiDwAEX';
      const BASE_HOUR = 4; // 凌晨4点基准

      // 状态
      const state = {
        models: [],
        results: {},
        isRunning: false,
        fullTestTimer: null,
        modelRefreshTimer: null,
        rateLimitCount: 0,
      };

      const $ = (s) => document.querySelector(s);
      const liveClock = $('#liveClock');
      const modelStatusList = $('#modelStatusList');
      const resultsBody = $('#resultsBody');
      const sumTotal = $('#sumTotal');
      const sumPass = $('#sumPass');
      const sumFail = $('#sumFail');
      const sumLimit = $('#sumLimit');

      function formatTime(ms) {
        if (ms == null || ms < 0) return '—';
        return ms < 1000 ? Math.round(ms) + 'ms' : (ms / 1000).toFixed(1) + 's';
      }

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }

      function isRateLimitError(msg) {
        return /429|rate.?limit|too.?many/i.test(msg || '');
      }

      // 时钟
      function updateClock() {
        const now = new Date();
        liveClock.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
      }
      setInterval(updateClock, 1000);
      updateClock();

      // 计算下一个触发时间
      function nextTriggerTime(minutesInterval, baseHour = BASE_HOUR) {
        const now = new Date();
        const msInterval = minutesInterval * 60 * 1000;
        const base = new Date(now);
        base.setHours(baseHour, 0, 0, 0);
        if (now < base) base.setDate(base.getDate() - 1);
        const elapsed = now.getTime() - base.getTime();
        const next = base.getTime() + Math.ceil(elapsed / msInterval) * msInterval;
        return new Date(next);
      }

      // 更新模型状态视图（颜色标记）
      function updateModelStatusView() {
        if (!state.models.length) {
          modelStatusList.innerHTML = '<span class="small">暂无模型</span>';
          return;
        }
        modelStatusList.innerHTML = state.models.map(m => {
          const res = state.results[m.id];
          let colorClass = '';
          if (!res) colorClass = '';
          else {
            const results = [res.nonStream, res.stream, res.toolCall];
            const hasFail = results.some(r => r && !r.success);
            if (!hasFail) colorClass = 'green';
            else {
              const allLimits = results.every(r => r && !r.success && isRateLimitError(r.error));
              if (allLimits) colorClass = 'yellow';
              else colorClass = 'red';
            }
          }
          return `<span class="model-chip ${colorClass}" title="${escapeHtml(m.id)}"><span class="dot"></span>${escapeHtml(m.id)}</span>`;
        }).join('');
      }

      // 更新汇总
      function updateSummary() {
        let total = 0,
          pass = 0,
          fail = 0,
          limitCount = 0;
        for (const r of Object.values(state.results)) {
          for (const key of ['nonStream', 'stream', 'toolCall']) {
            if (r[key]) {
              total++;
              if (r[key].success) pass++;
              else {
                fail++;
                if (isRateLimitError(r[key].error)) limitCount++;
              }
            }
          }
        }
        sumTotal.textContent = total;
        sumPass.textContent = pass;
        sumFail.textContent = fail;
        sumLimit.textContent = limitCount;
      }

      // 渲染结果表格
      function renderResultsTable() {
        if (!Object.keys(state.results).length) {
          resultsBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#555;">暂无测试结果</td></tr>';
          return;
        }
        const models = Object.keys(state.results).sort();
        resultsBody.innerHTML = models.map(model => {
          const r = state.results[model];
          const n = r.nonStream || {},
            s = r.stream || {},
            t = r.toolCall || {};
          const nonHtml = n.success ? '<span class="badge pass">通过</span>' : (isRateLimitError(n.error) ?
            '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          const strHtml = s.success ? '<span class="badge pass">通过</span>' : (isRateLimitError(s.error) ?
            '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          const toolHtml = t.success ? (t.hasTools ? '<span class="badge pass">已调用</span>' :
            '<span class="badge warn">未调用</span>') : (isRateLimitError(t.error) ? '<span class="badge limit">限流</span>' :
            '<span class="badge fail">失败</span>');
          return `<tr>
            <td>${escapeHtml(model)}</td>
            <td>${nonHtml}</td><td>${formatTime(n.elapsed)}</td>
            <td>${strHtml}</td><td>${formatTime(s.firstByte)}</td><td>${formatTime(s.elapsed)}</td>
            <td>${toolHtml}</td><td>${formatTime(t.elapsed)}</td>
            <td><span class="clickable" onclick="showDetail('${escapeHtml(model)}')">详情</span></td>
          </tr>`;
        }).join('');
      }

      window.showDetail = (model) => {
        const r = state.results[model];
        if (!r) return;
        alert(JSON.stringify({ model, ...r }, null, 2));
      };

      // API调用
      async function fetchWithTimeout(url, options, sec = 45) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), sec * 1000);
        try {
          const resp = await fetch(url, { ...options, signal: ctrl.signal });
          clearTimeout(timer);
          return resp;
        } catch (e) {
          clearTimeout(timer);
          throw e.name === 'AbortError' ? new Error('超时') : e;
        }
      }

      async function testNonStream(model) {
        const t0 = performance.now();
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: [{ role: 'user', content: '你好，用一句话介绍自己。' }], stream: false,
            max_tokens: 100 })
        });
        const elapsed = performance.now() - t0;
        if (!resp.ok) {
          const txt = await resp.text().catch(() => '');
          return { success: false, elapsed, error: `${resp.status}`, detail: txt };
        }
        const data = await resp.json();
        return { success: true, elapsed, content: data.choices?.[0]?.message?.content, usage: data.usage || null };
      }

      async function testStream(model) {
        const t0 = performance.now();
        let firstByte = null,
          content = '',
          chunks = 0,
          usage = null;
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: [{ role: 'user', content: '一句话介绍人工智能。' }], stream: true,
            max_tokens: 100, stream_options: { include_usage: true } })
        }, 60);
        if (!resp.ok) {
          const txt = await resp.text().catch(() => '');
          return { success: false, elapsed: performance.now() - t0, error: `${resp.status}`, detail: txt };
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (!firstByte) firstByte = performance.now() - t0;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const d = line.slice(5).trim();
            if (d === '[DONE]') continue;
            try { const j = JSON.parse(d); if (j.usage) usage = j.usage; const c = j.choices?.[0]?.delta?.content; if (c)
                content += c;
              chunks++; } catch {}
          }
        }
        return { success: true, elapsed: performance.now() - t0, firstByte, content, chunks, usage };
      }

      async function testToolCall(model) {
        const t0 = performance.now();
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: [{ role: 'user', content: '北京天气如何？' }], tools: [{ type: 'function',
              function: { name: 'get_weather', parameters: { type: 'object', properties: { city: { type: 'string' } },
                  required: ['city'] } } }], tool_choice: 'auto', stream: false })
        });
        const elapsed = performance.now() - t0;
        if (!resp.ok) {
          const txt = await resp.text().catch(() => '');
          return { success: false, elapsed, error: `${resp.status}`, detail: txt };
        }
        const data = await resp.json();
        const hasTools = !!data.choices?.[0]?.message?.tool_calls;
        return { success: true, elapsed, hasTools, usage: data.usage || null, content: data.choices?.[0]?.message
            ?.content };
      }

      async function runSingleModelTests(model) {
        const res = { nonStream: null, stream: null, toolCall: null };
        try { res.nonStream = await testNonStream(model); } catch (e) { res.nonStream = { success: false, error: e
            .message }; }
        try { res.stream = await testStream(model); } catch (e) { res.stream = { success: false, error: e.message }; }
        try { res.toolCall = await testToolCall(model); } catch (e) { res.toolCall = { success: false, error: e
            .message }; }
        return res;
      }

      // 全量测试
      async function runFullTest() {
        if (state.isRunning) return;
        state.isRunning = true;
        await refreshModels();
        const models = state.models.map(m => m.id);
        for (const model of models) {
          if (!state.isRunning) break;
          const res = await runSingleModelTests(model);
          state.results[model] = res;
          renderResultsTable();
          updateSummary();
          updateModelStatusView();
          await new Promise(r => setTimeout(r, 500));
        }
        state.isRunning = false;
      }

      // 刷新模型列表
      async function refreshModels() {
        try {
          const resp = await fetch(API_BASE + '/models', {
            headers: { 'Authorization': `Bearer ${API_KEY}` }
          });
          if (!resp.ok) throw new Error('模型列表获取失败');
          const data = await resp.json();
          let list = data?.data ? data.data.map(m => m.id || m) : [];
          state.models = [...new Set(list.filter(Boolean))].map(id => ({ id }));
          updateModelStatusView();
        } catch (e) {}
      }

      // 定时调度
      function scheduleTasks() {
        if (state.fullTestTimer) clearTimeout(state.fullTestTimer);
        if (state.modelRefreshTimer) clearTimeout(state.modelRefreshTimer);

        const now = new Date();
        const nextFull = nextTriggerTime(60);
        const nextRefresh = nextTriggerTime(30);

        state.fullTestTimer = setTimeout(() => {
          runFullTest();
          scheduleTasks();
        }, nextFull.getTime() - now.getTime());

        state.modelRefreshTimer = setTimeout(() => {
          refreshModels();
          scheduleTasks();
        }, nextRefresh.getTime() - now.getTime());
      }

      // 初始化
      async function init() {
        await refreshModels();
        await runFullTest();
        scheduleTasks();
      }

      init().catch(console.error);
    })();
  </script>
</body>
</html>

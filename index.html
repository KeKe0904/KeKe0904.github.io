<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>API 全能力监控 · nonwaste.cn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --glass-bg: rgba(20, 22, 24, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --blur: 22px;
      --text-primary: #f0f0f0;
      --text-secondary: #a8a8a8;
      --text-muted: #6a6a6a;
      --success: #6ecf8a;
      --danger: #e0676b;
      --warning: #d4a853;
      --info: #7fb7d4;
      --radius: 18px;
      --radius-sm: 10px;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    }
    body {
      font-family: var(--font-sans);
      background: radial-gradient(circle at 25% 30%, #121418 0%, #090a0c 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.4;
      padding: 1.8rem 1.5rem;
      display: flex;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      max-width: 1300px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.3rem 1.8rem;
      backdrop-filter: blur(28px);
      background: rgba(16, 18, 20, 0.6);
    }
    .logo h1 {
      font-weight: 550;
      font-size: 1.25rem;
      color: var(--text-primary);
    }
    .logo .sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6ecf8a;
      box-shadow: 0 0 12px #6ecf8a;
      display: inline-block;
      margin-right: 6px;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .clock {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: #ccc;
    }
    .grid-2col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .card {
      padding: 1.2rem;
    }
    .card-title {
      font-weight: 550;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .stat-item {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 0.8rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 600;
      color: #ddd;
    }
    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .model-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      max-height: 180px;
      overflow-y: auto;
    }
    .model-chip {
      padding: 0.25rem 0.8rem;
      border-radius: 16px;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #bbb;
    }
    .model-chip.failed {
      border-color: rgba(224,103,107,0.4);
      color: #e88488;
    }
    .model-chip.excluded {
      border-color: rgba(212,168,83,0.5);
      color: #dbb862;
      text-decoration: line-through;
    }
    .table-wrap {
      overflow-x: auto;
      padding: 0.8rem 1.5rem;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.7rem;
      font-weight: 500;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
    }
    td {
      padding: 0.6rem 0.7rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #ccc;
    }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 500;
      background: rgba(255,255,255,0.06);
    }
    .badge.pass { background: rgba(110,207,138,0.15); color: #8fdda0; }
    .badge.fail { background: rgba(224,103,107,0.15); color: #e88488; }
    .badge.limit { background: rgba(212,168,83,0.2); color: #dbb862; }
    .badge.warn { background: rgba(212,168,83,0.1); color: #dbb862; }
    .clickable { cursor: pointer; color: #aaa; }
    .clickable:hover { color: #fff; }
    .small-text { font-size: 0.65rem; color: #888; }
    .time-info {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: #aaa;
      margin-left: 0.5rem;
    }
    .btn {
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #ddd;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); }
    .toast-area {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      background: rgba(22,22,24,0.9);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ddd;
      font-size: 0.75rem;
      animation: toastIn 0.3s ease, toastOut 0.3s 2.5s forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-8px); }
    }
    @media (max-width: 700px) {
      .header { padding: 1rem; }
      .table-wrap { padding: 0.5rem; }
      .stat-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="glass header">
      <div class="logo">
        <h1><span class="status-dot"></span> API 全能力监控</h1>
        <div class="sub">https://nonwaste.cn/v1 · 全自动定时测试</div>
      </div>
      <div class="clock" id="liveClock">--</div>
    </div>

    <!-- 计划与状态 -->
    <div class="grid-2col">
      <div class="glass card">
        <div class="card-title">⏱ 任务调度</div>
        <div style="display:flex; flex-direction: column; gap:0.6rem; font-size:0.8rem;">
          <div><span class="small-text">下次全量测试</span> <span id="nextFullTest" class="time-info">计算中...</span></div>
          <div><span class="small-text">下次刷新模型</span> <span id="nextModelRefresh" class="time-info">计算中...</span></div>
          <div><span class="small-text">待重试模型</span> <span id="retryQueueCount" class="time-info">0</span></div>
          <div><span class="small-text">今日排除模型</span> <span id="excludedCount" class="time-info">0</span></div>
        </div>
      </div>
      <div class="glass card">
        <div class="card-title">📊 最近测试汇总</div>
        <div class="stat-row" id="summaryStats">
          <div class="stat-item"><div class="stat-value" id="sumTotal">0</div><div class="stat-label">总计</div></div>
          <div class="stat-item"><div class="stat-value" id="sumPass" style="color:#8fdda0;">0</div><div class="stat-label">通过</div></div>
          <div class="stat-item"><div class="stat-value" id="sumFail" style="color:#e88488;">0</div><div class="stat-label">失败</div></div>
          <div class="stat-item"><div class="stat-value" id="sumLimit" style="color:#dbb862;">0</div><div class="stat-label">限流</div></div>
        </div>
      </div>
    </div>

    <!-- 模型状态 -->
    <div class="glass card">
      <div class="card-title">🔬 模型状态（红色=有失败，黄色=今日排除）</div>
      <div class="model-list" id="modelStatusList"></div>
    </div>

    <!-- 结果表格 -->
    <div class="glass">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>模型</th><th>非流式</th><th>耗时</th><th>流式</th><th>首字节</th><th>总耗时</th><th>工具调用</th><th>耗时</th><th>详情</th></tr>
          </thead>
          <tbody id="resultsBody"><tr><td colspan="9" style="text-align:center;color:#555;">等待首次测试...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="toast-area" id="toastArea"></div>

  <script>
    (function() {
      // 固定配置
      const API_BASE = 'https://nonwaste.cn/v1';
      const API_KEY = 'sk-gdl1Y5dVRU2CtPD1wigccNgN9MYcB26FKVKFODXN6fiDwAEX';
      const BASE_HOUR = 4; // 每日基准时间 4:00

      // 全局状态
      const state = {
        models: [],                  // [{id}]
        results: {},                // {modelId: {nonStream, stream, toolCall}}
        modelStatus: {},            // {modelId: {consecutiveFails:0, excluded:false, retryTimer:null}}
        isRunning: false,
        fullTestTimer: null,
        modelRefreshTimer: null,
        lastFullTest: null,
        rateLimitCount: 0,
      };

      // DOM 元素
      const $ = (s) => document.querySelector(s);
      const liveClock = $('#liveClock');
      const nextFullTestEl = $('#nextFullTest');
      const nextModelRefreshEl = $('#nextModelRefresh');
      const retryQueueCountEl = $('#retryQueueCount');
      const excludedCountEl = $('#excludedCount');
      const modelStatusList = $('#modelStatusList');
      const resultsBody = $('#resultsBody');
      const sumTotal = $('#sumTotal');
      const sumPass = $('#sumPass');
      const sumFail = $('#sumFail');
      const sumLimit = $('#sumLimit');
      const toastArea = $('#toastArea');

      function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        toastArea.appendChild(t);
        setTimeout(() => t.remove(), 2800);
      }

      function formatTime(ms) {
        if (ms == null || ms < 0) return '—';
        return ms < 1000 ? Math.round(ms) + 'ms' : (ms / 1000).toFixed(1) + 's';
      }

      function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

      // 时钟与计划时间显示
      function updateClock() {
        const now = new Date();
        liveClock.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
      }
      setInterval(updateClock, 1000);
      updateClock();

      // 计算下一个触发时间（分钟为周期，基准小时从BASE_HOUR开始）
      function nextTriggerTime(minutesInterval, baseHour = BASE_HOUR) {
        const now = new Date();
        const msInterval = minutesInterval * 60 * 1000;
        // 找到从baseHour开始到今天凌晨baseHour的基准时间
        const base = new Date(now);
        base.setHours(baseHour, 0, 0, 0);
        // 如果现在已经过了今天的基准时间，基准就是今天，否则是昨天
        if (now < base) base.setDate(base.getDate() - 1);
        // 计算从base到现在的毫秒数，找到下一个整周期时间点
        const elapsed = now.getTime() - base.getTime();
        const next = base.getTime() + Math.ceil(elapsed / msInterval) * msInterval;
        return new Date(next);
      }

      function formatNextTime(date) {
        if (!date) return '--';
        return date.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }) +
               ' (' + Math.round((date - new Date()) / 60000) + '分钟后)';
      }

      function updateScheduleDisplay() {
        const now = new Date();
        const nextFull = nextTriggerTime(60, BASE_HOUR);
        const nextRefresh = nextTriggerTime(30, BASE_HOUR);
        nextFullTestEl.textContent = formatNextTime(nextFull);
        nextModelRefreshEl.textContent = formatNextTime(nextRefresh);
        // 统计待重试和排除数量
        let retryCount = 0, excludedCount = 0;
        Object.values(state.modelStatus).forEach(s => {
          if (s.retryTimer) retryCount++;
          if (s.excluded) excludedCount++;
        });
        retryQueueCountEl.textContent = retryCount;
        excludedCountEl.textContent = excludedCount;
        // 更新模型状态列表
        renderModelStatus();
      }

      // 渲染模型状态标签
      function renderModelStatus() {
        if (!state.models.length) {
          modelStatusList.innerHTML = '<span class="small-text">暂无模型</span>';
          return;
        }
        modelStatusList.innerHTML = state.models.map(m => {
          const status = state.modelStatus[m.id] || {};
          let cls = '';
          if (status.excluded) cls = 'excluded';
          else if (status.consecutiveFails > 0) cls = 'failed';
          return `<span class="model-chip ${cls}" title="连续失败:${status.consecutiveFails||0} 排除:${status.excluded?'是':'否'}">${escapeHtml(m.id)}</span>`;
        }).join('');
      }

      // 更新汇总统计
      function updateSummary() {
        let total = 0, pass = 0, fail = 0, limitCount = 0;
        for (const r of Object.values(state.results)) {
          for (const key of ['nonStream','stream','toolCall']) {
            if (r[key]) {
              total++;
              if (r[key].success) pass++;
              else {
                fail++;
                if (isRateLimitError(r[key].error)) limitCount++;
              }
            }
          }
        }
        sumTotal.textContent = total;
        sumPass.textContent = pass;
        sumFail.textContent = fail;
        sumLimit.textContent = limitCount;
      }

      function isRateLimitError(msg) { return /429|rate.?limit|too.?many/i.test(msg||''); }

      // 渲染结果表格
      function renderResultsTable() {
        if (!Object.keys(state.results).length) {
          resultsBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#555;">暂无测试结果</td></tr>';
          return;
        }
        const models = Object.keys(state.results).sort();
        resultsBody.innerHTML = models.map(model => {
          const r = state.results[model];
          const n = r.nonStream || {}, s = r.stream || {}, t = r.toolCall || {};
          const nonHtml = n.success ? '<span class="badge pass">通过</span>' : (isRateLimitError(n.error) ? '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          const strHtml = s.success ? '<span class="badge pass">通过</span>' : (isRateLimitError(s.error) ? '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          const toolHtml = t.success ? (t.hasTools ? '<span class="badge pass">已调用</span>' : '<span class="badge warn">未调用</span>') : (isRateLimitError(t.error) ? '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          return `<tr>
            <td>${escapeHtml(model)}</td>
            <td>${nonHtml}</td><td>${formatTime(n.elapsed)}</td>
            <td>${strHtml}</td><td>${formatTime(s.firstByte)}</td><td>${formatTime(s.elapsed)}</td>
            <td>${toolHtml}</td><td>${formatTime(t.elapsed)}</td>
            <td><span class="clickable" onclick="showDetail('${escapeHtml(model)}')">详情</span></td>
          </tr>`;
        }).join('');
      }

      window.showDetail = (model) => {
        const r = state.results[model];
        if (!r) return;
        alert(JSON.stringify({model, ...r}, null, 2));
      };

      // API 调用函数 (带超时)
      async function fetchWithTimeout(url, options, sec=45) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), sec*1000);
        try {
          const resp = await fetch(url, {...options, signal: ctrl.signal});
          clearTimeout(timer);
          return resp;
        } catch(e) {
          clearTimeout(timer);
          throw e.name==='AbortError' ? new Error('超时') : e;
        }
      }

      async function testNonStream(model) {
        const t0 = performance.now();
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method:'POST',
          headers: {'Authorization':`Bearer ${API_KEY}`, 'Content-Type':'application/json'},
          body: JSON.stringify({model, messages:[{role:'user',content:'你好，用一句话介绍自己。'}], stream:false, max_tokens:100})
        });
        const elapsed = performance.now()-t0;
        if (!resp.ok) {
          const txt = await resp.text().catch(()=>'');
          return {success:false, elapsed, error:`${resp.status}`, detail:txt};
        }
        const data = await resp.json();
        return {success:true, elapsed, content: data.choices?.[0]?.message?.content, usage: data.usage||null};
      }

      async function testStream(model) {
        const t0 = performance.now();
        let firstByte=null, content='', chunks=0, usage=null;
        const resp = await fetchWithTimeout(API_BASE+'/chat/completions', {
          method:'POST',
          headers: {'Authorization':`Bearer ${API_KEY}`, 'Content-Type':'application/json'},
          body: JSON.stringify({model, messages:[{role:'user',content:'一句话介绍人工智能。'}], stream:true, max_tokens:100, stream_options:{include_usage:true}})
        }, 60);
        if (!resp.ok) {
          const txt = await resp.text().catch(()=>'');
          return {success:false, elapsed:performance.now()-t0, error:`${resp.status}`, detail:txt};
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer='';
        while(true){
          const {done, value} = await reader.read();
          if(done) break;
          if(!firstByte) firstByte = performance.now()-t0;
          buffer += decoder.decode(value, {stream:true});
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for(const line of lines){
            if(!line.startsWith('data:')) continue;
            const d=line.slice(5).trim();
            if(d==='[DONE]') continue;
            try{ const j=JSON.parse(d); if(j.usage) usage=j.usage; const c=j.choices?.[0]?.delta?.content; if(c) content+=c; chunks++; } catch{}
          }
        }
        return {success:true, elapsed:performance.now()-t0, firstByte, content, chunks, usage};
      }

      async function testToolCall(model) {
        const t0 = performance.now();
        const resp = await fetchWithTimeout(API_BASE+'/chat/completions', {
          method:'POST',
          headers: {'Authorization':`Bearer ${API_KEY}`, 'Content-Type':'application/json'},
          body: JSON.stringify({model, messages:[{role:'user',content:'北京天气如何？'}], tools:[{type:'function',function:{name:'get_weather',parameters:{type:'object',properties:{city:{type:'string'}},required:['city']}}}], tool_choice:'auto', stream:false})
        });
        const elapsed = performance.now()-t0;
        if(!resp.ok){
          const txt = await resp.text().catch(()=>'');
          return {success:false, elapsed, error:`${resp.status}`, detail:txt};
        }
        const data = await resp.json();
        const hasTools = !!data.choices?.[0]?.message?.tool_calls;
        return {success:true, elapsed, hasTools, usage: data.usage||null, content: data.choices?.[0]?.message?.content};
      }

      // 单个模型全测试
      async function runSingleModelTests(model) {
        const res = {nonStream:null, stream:null, toolCall:null};
        try{ res.nonStream = await testNonStream(model); } catch(e){ res.nonStream = {success:false, error:e.message}; }
        try{ res.stream = await testStream(model); } catch(e){ res.stream = {success:false, error:e.message}; }
        try{ res.toolCall = await testToolCall(model); } catch(e){ res.toolCall = {success:false, error:e.message}; }
        return res;
      }

      // 检查模型是否有失败/限速
      function modelHasFailure(modelId) {
        const r = state.results[modelId];
        if (!r) return false;
        for (const key of ['nonStream','stream','toolCall']) {
          if (r[key] && !r[key].success) return true;
        }
        return false;
      }

      // 处理模型失败后的重试逻辑
      function handleModelFailure(modelId) {
        if (!state.modelStatus[modelId]) state.modelStatus[modelId] = {consecutiveFails:0, excluded:false, retryTimer:null};
        const st = state.modelStatus[modelId];
        if (st.excluded) return; // 今日已排除
        st.consecutiveFails++;
        if (st.consecutiveFails >= 3) {
          st.excluded = true;
          showToast(`模型 ${modelId} 连续失败3次，今日不再额外重试`);
          if (st.retryTimer) { clearTimeout(st.retryTimer); st.retryTimer = null; }
          updateScheduleDisplay();
          return;
        }
        // 安排半小时后重试
        if (st.retryTimer) clearTimeout(st.retryTimer);
        st.retryTimer = setTimeout(() => retryModel(modelId), 30 * 60 * 1000);
        showToast(`模型 ${modelId} 失败，将在30分钟后重试 (第${st.consecutiveFails}次)`);
        updateScheduleDisplay();
      }

      async function retryModel(modelId) {
        if (state.isRunning) {
          // 如果正在全量测试，等待结束后再重试？简单处理：延迟1分钟再试
          setTimeout(() => retryModel(modelId), 60000);
          return;
        }
        showToast(`开始重试模型 ${modelId}`);
        const res = await runSingleModelTests(modelId);
        state.results[modelId] = res;
        renderResultsTable();
        updateSummary();
        // 更新状态
        const st = state.modelStatus[modelId] || {consecutiveFails:0, excluded:false};
        st.retryTimer = null;
        if (modelHasFailure(modelId)) {
          st.consecutiveFails++;
          if (st.consecutiveFails >= 3) {
            st.excluded = true;
            showToast(`模型 ${modelId} 重试后仍失败，已达3次，今日排除`);
          } else {
            // 重新安排半小时后重试
            st.retryTimer = setTimeout(() => retryModel(modelId), 30 * 60 * 1000);
          }
        } else {
          st.consecutiveFails = 0;
          st.excluded = false;
        }
        state.modelStatus[modelId] = st;
        updateScheduleDisplay();
      }

      // 全量测试
      async function runFullTest() {
        if (state.isRunning) return;
        state.isRunning = true;
        showToast('开始全量测试...');
        // 刷新模型列表
        await refreshModels();
        const models = state.models.map(m => m.id);
        // 顺序测试以避免过载
        for (const model of models) {
          if (!state.isRunning) break;
          const res = await runSingleModelTests(model);
          state.results[model] = res;
          renderResultsTable();
          updateSummary();
          // 处理失败
          if (modelHasFailure(model)) {
            handleModelFailure(model);
          } else {
            // 成功后重置状态
            if (state.modelStatus[model]) {
              state.modelStatus[model].consecutiveFails = 0;
              state.modelStatus[model].excluded = false;
              if (state.modelStatus[model].retryTimer) {
                clearTimeout(state.modelStatus[model].retryTimer);
                state.modelStatus[model].retryTimer = null;
              }
            }
          }
          // 小延迟避免请求过快
          await new Promise(r => setTimeout(r, 600));
        }
        state.isRunning = false;
        state.lastFullTest = new Date();
        updateScheduleDisplay();
        showToast('全量测试完成');
      }

      // 刷新模型列表
      async function refreshModels() {
        try {
          const resp = await fetch(API_BASE + '/models', {
            headers: {'Authorization': `Bearer ${API_KEY}`}
          });
          if (!resp.ok) throw new Error('模型列表获取失败');
          const data = await resp.json();
          let list = data?.data ? data.data.map(m=>m.id||m) : [];
          state.models = [...new Set(list.filter(Boolean))].map(id => ({id}));
          // 初始化未有的模型状态
          state.models.forEach(m => {
            if (!state.modelStatus[m.id]) state.modelStatus[m.id] = {consecutiveFails:0, excluded:false, retryTimer:null};
          });
          updateScheduleDisplay();
        } catch(e) {
          showToast('模型刷新失败: '+e.message);
        }
      }

      // 每日重置 (在凌晨4点触发)
      function scheduleDailyReset() {
        const now = new Date();
        const resetTime = new Date(now);
        resetTime.setHours(BASE_HOUR, 0, 0, 0);
        if (now >= resetTime) resetTime.setDate(resetTime.getDate() + 1);
        const delay = resetTime.getTime() - now.getTime();
        setTimeout(() => {
          // 重置所有排除状态
          Object.values(state.modelStatus).forEach(s => {
            s.consecutiveFails = 0;
            s.excluded = false;
            if (s.retryTimer) { clearTimeout(s.retryTimer); s.retryTimer = null; }
          });
          showToast('每日重置：失败计数已清零');
          updateScheduleDisplay();
          scheduleDailyReset(); // 安排下一天
        }, delay);
      }

      // 启动定时任务
      function scheduleTasks() {
        // 清除旧定时器
        if (state.fullTestTimer) clearTimeout(state.fullTestTimer);
        if (state.modelRefreshTimer) clearTimeout(state.modelRefreshTimer);

        const now = new Date();
        const nextFull = nextTriggerTime(60, BASE_HOUR);
        const nextRefresh = nextTriggerTime(30, BASE_HOUR);

        state.fullTestTimer = setTimeout(() => {
          runFullTest();
          scheduleTasks(); // 递归安排下一次
        }, nextFull.getTime() - now.getTime());

        state.modelRefreshTimer = setTimeout(() => {
          refreshModels();
          scheduleTasks(); // 递归安排
        }, nextRefresh.getTime() - now.getTime());

        updateScheduleDisplay();
      }

      // 初始化启动
      async function init() {
        updateClock();
        await refreshModels();
        // 立即执行一次全量测试（如果需要）
        showToast('系统就绪，即将开始首次全量测试');
        await runFullTest();
        scheduleDailyReset();
        scheduleTasks();
      }

      init().catch(e => console.error(e));

      // 每10秒更新计划显示
      setInterval(updateScheduleDisplay, 10000);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>API 能力即时诊断 · nonwaste.cn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --green: #4caf84;
      --red: #e0555c;
      --yellow: #d4a853;
      --purple: #b98cd6;
      --blue: #5b9bd5;
      --text-primary: #f2f2f2;
      --text-secondary: #b0b0b0;
      --surface: rgba(18, 20, 22, 0.75);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    }
    body {
      font-family: var(--font-sans);
      background: #0a0c0e;
      background-image: url('https://t.alcy.cc/ycy');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 1400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo h1 {
      font-size: 1.2rem;
      font-weight: 550;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #eee;
    }
    .status-led {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 600;
      color: #ddd;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .model-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .model-chip {
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #bbb;
    }
    .model-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .model-chip.green { border-color: rgba(76, 175, 132, 0.4); color: #a5d6a7; }
    .model-chip.green .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .model-chip.yellow { border-color: rgba(212, 168, 83, 0.5); color: #dbb862; }
    .model-chip.yellow .dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .model-chip.red { border-color: rgba(224, 85, 92, 0.5); color: #e88488; }
    .model-chip.red .dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .model-chip.purple { border-color: rgba(185, 140, 214, 0.5); color: #c9a2e0; }
    .model-chip.purple .dot { background: var(--purple); box-shadow: 0 0 6px var(--purple); }
    .model-chip.blue { border-color: rgba(91, 155, 213, 0.5); color: #8ab8e8; }
    .model-chip.blue .dot { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.3rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.7rem;
      font-weight: 500;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      white-space: nowrap;
    }
    td {
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #ccc;
      vertical-align: middle;
    }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 14px;
      font-size: 0.65rem;
      font-weight: 500;
    }
    .badge.pass { background: rgba(76, 175, 132, 0.15); color: #8fdda0; }
    .badge.fail { background: rgba(224, 85, 92, 0.2); color: #e88488; }
    .badge.limit { background: rgba(212, 168, 83, 0.2); color: #dbb862; }
    .badge.warn { background: rgba(212, 168, 83, 0.1); color: #dbb862; }
    .clickable {
      cursor: pointer;
      color: #aaa;
      font-size: 0.75rem;
      text-decoration: underline;
      text-decoration-style: dotted;
    }
    .clickable:hover { color: #fff; }
    .small { font-size: 0.7rem; color: #888; }
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: rgba(30,30,32,0.9); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      padding: 2rem; color: #ddd; max-width: 400px; width: 90%;
    }
    .modal-box h2 { margin-bottom: 1rem; font-weight: 500; }
    .modal-box p { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .btn-primary {
      padding: 0.6rem 1.4rem; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.2); color: #fff; font-weight: 500;
      cursor: pointer; backdrop-filter: blur(10px);
    }
    .btn-primary:hover { background: rgba(255,255,255,0.3); }
    @media (max-width: 700px) {
      body { padding: 0.8rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container" id="mainContent">
    <div class="card header">
      <div class="logo">
        <h1><span class="status-led"></span> API 能力即时诊断</h1>
      </div>
      <div style="color:#aaa; font-size:0.8rem;">nonwaste.cn · 随机中英文实际调用</div>
    </div>

    <div class="card">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="sumTotal">0</div><div class="stat-label">总测试</div></div>
        <div class="stat-card"><div class="stat-value" id="sumPass" style="color:#8fdda0;">0</div><div class="stat-label">通过</div></div>
        <div class="stat-card"><div class="stat-value" id="sumFail" style="color:#e88488;">0</div><div class="stat-label">失败</div></div>
        <div class="stat-card"><div class="stat-value" id="sumLimit" style="color:#dbb862;">0</div><div class="stat-label">限流</div></div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:0.8rem; display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
        <span>模型状态</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--green);"></span>全部可用</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--red);"></span>全部失败</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--yellow);"></span>全部限流</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--blue);"></span>部分失败</span>
        <span style="display:flex; gap:0.3rem; align-items:center;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--purple);"></span>部分限流</span>
      </div>
      <div class="model-bar" id="modelStatusList"></div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>模型</th>
              <th>非流式</th>
              <th>耗时</th>
              <th>流式</th>
              <th>首字节</th>
              <th>总耗时</th>
              <th>工具调用</th>
              <th>耗时</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="resultsBody"><tr><td colspan="9" style="text-align:center;color:#555;">正在测试...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const API_BASE = 'https://nonwaste.cn/v1';
      const API_KEYS = [
        'sk-0fw8rmuQAqdjMTeu9VeF5o0EorMb3PhOPtd7dd39hvJn4mwZ',
        'sk-rFOZljfzLhDJ7ZX6zzjIHgQqXJ2wzAi7Vnp0RYkjiDSZwOJG',
        'sk-QXWRgbcJw77Ofa2HYOVy7bWevQClglBONpbR4IfotNW0Stvt',
        'sk-tv9ifaP0pI2GWqp00WhlIgSfosTg2Unb3wlS4sHvBJVoY7EK',
        'sk-Q84wkn7Gufo31V8NQIX6jPjMuowoMlRaNO0NMIyt23nUdZGR',
        'sk-RRtrissO4OBz0NLFTrXRE3z1rdBSl5wiuLjmhFXrfAnSKzuH',
        'sk-UcBgdjfeHG8xCzotbqBfm2hQd1NmJjK82n6KTs9rDDlO0w55',
        'sk-5uV8x33brMJOyjjGsvNzsEeHO5DLopezhBpCf8HCY7T9A9fX',
        'sk-8LsU7hcTWIPOtGRZKbIy8gFNgof5egmtaYSUTQbkR6n5qJF0',
        'sk-XW0Qc2doWuzt44BXFLBgFB3R7Ay70IyZ4XQ1adwTAvgGry66'
      ];
      const COOLDOWN_MS = 10 * 60 * 1000;

      const PROMPTS = {
        nonStream: {
          zh: { role: 'user', content: '你好，请用一句话介绍你自己。' },
          en: { role: 'user', content: 'Hello, please introduce yourself in one sentence.' }
        },
        stream: {
          zh: { role: 'user', content: '请用一句话概括人工智能是什么。' },
          en: { role: 'user', content: 'Summarize what artificial intelligence is in one sentence.' }
        },
        toolCall: {
          zh: { role: 'user', content: '今天北京的天气怎么样？请使用摄氏温度。' },
          en: { role: 'user', content: 'What is the weather like in London today? Use Celsius.' }
        }
      };

      function randomKey() {
        return API_KEYS[Math.floor(Math.random() * API_KEYS.length)];
      }

      function randomLang() {
        return Math.random() < 0.5 ? 'zh' : 'en';
      }

      const state = {
        models: [],
        results: {},
        isRunning: false,
        rateLimitCount: 0,
      };

      const $ = (s) => document.querySelector(s);
      const modelStatusList = $('#modelStatusList');
      const resultsBody = $('#resultsBody');
      const sumTotal = $('#sumTotal');
      const sumPass = $('#sumPass');
      const sumFail = $('#sumFail');
      const sumLimit = $('#sumLimit');

      function formatTime(ms) {
        if (ms == null || ms < 0) return '—';
        return ms < 1000 ? Math.round(ms) + 'ms' : (ms / 1000).toFixed(1) + 's';
      }

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }

      function isRateLimitError(msg) {
        return /429|rate.?limit|too.?many/i.test(msg || '');
      }

      function checkAccessCooldown() {
        try {
          const lastVisit = localStorage.getItem('api_diag_v3_last');
          if (lastVisit) {
            const elapsed = Date.now() - parseInt(lastVisit);
            if (elapsed < COOLDOWN_MS) {
              showCooldownModal();
              return false;
            }
          }
          localStorage.setItem('api_diag_v3_last', Date.now().toString());
          return true;
        } catch (e) { return true; }
      }

      function showCooldownModal() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal-box">
            <h2>请稍后再试</h2>
            <p>您刚刚完成了一次诊断，请在 10 分钟后再次进入页面。</p>
            <button class="btn-primary" id="closeModalBtn">知道了</button>
          </div>`;
        document.body.appendChild(overlay);
        document.getElementById('closeModalBtn').addEventListener('click', () => overlay.remove());
      }

      function getModelColor(resultsArray) {
        let pass = 0, realFail = 0, rateLimit = 0;
        resultsArray.forEach(r => {
          if (!r) return;
          if (r.success) pass++;
          else if (isRateLimitError(r.error)) rateLimit++;
          else realFail++;
        });
        const total = pass + realFail + rateLimit;
        if (total === 0) return '';
        if (pass === total) return 'green';
        if (realFail === total) return 'red';
        if (rateLimit === total) return 'yellow';
        if (realFail > 0) return 'blue';
        if (rateLimit > 0) return 'purple';
        return '';
      }

      function updateModelStatusView() {
        if (!state.models.length) {
          modelStatusList.innerHTML = '<span class="small">暂无模型</span>';
          return;
        }
        modelStatusList.innerHTML = state.models.map(m => {
          const res = state.results[m.id];
          let colorClass = '';
          if (res) {
            const results = [res.nonStream, res.stream, res.toolCall];
            colorClass = getModelColor(results);
          }
          return `<span class="model-chip ${colorClass}" title="${escapeHtml(m.id)}"><span class="dot"></span>${escapeHtml(m.id)}</span>`;
        }).join('');
      }

      function updateSummary() {
        let total = 0, pass = 0, fail = 0, limitCount = 0;
        for (const r of Object.values(state.results)) {
          for (const key of ['nonStream', 'stream', 'toolCall']) {
            if (r[key]) {
              total++;
              if (r[key].success) pass++;
              else {
                fail++;
                if (isRateLimitError(r[key].error)) limitCount++;
              }
            }
          }
        }
        sumTotal.textContent = total;
        sumPass.textContent = pass;
        sumFail.textContent = fail;
        sumLimit.textContent = limitCount;
      }

      function renderResultsTable() {
        if (!Object.keys(state.results).length) {
          resultsBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#555;">等待测试完成...</td></tr>';
          return;
        }
        const models = Object.keys(state.results).sort();
        resultsBody.innerHTML = models.map(model => {
          const r = state.results[model];
          const n = r.nonStream || {}, s = r.stream || {}, t = r.toolCall || {};

          let nonHtml = n.success ? '<span class="badge pass">通过</span>' :
            (isRateLimitError(n.error) ? '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          let strHtml = s.success ? '<span class="badge pass">通过</span>' :
            (isRateLimitError(s.error) ? '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');
          let toolHtml = t.success ?
            (t.hasTools ? '<span class="badge pass">已调用</span>' : '<span class="badge warn">未调用</span>') :
            (isRateLimitError(t.error) ? '<span class="badge limit">限流</span>' : '<span class="badge fail">失败</span>');

          return `<tr>
            <td>${escapeHtml(model)}</td>
            <td>${nonHtml}</td><td>${formatTime(n.elapsed)}</td>
            <td>${strHtml}</td><td>${formatTime(s.firstByte)}</td><td>${formatTime(s.elapsed)}</td>
            <td>${toolHtml}</td><td>${formatTime(t.elapsed)}</td>
            <td><span class="clickable" onclick="showDetail('${escapeHtml(model)}')">详情</span></td>
          </tr>`;
        }).join('');
      }

      window.showDetail = (model) => {
        const r = state.results[model];
        if (!r) return;
        const detail = { model, nonStream: r.nonStream, stream: r.stream, toolCall: r.toolCall };
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal-box" style="text-align:left; max-width:600px; max-height:80vh; overflow-y:auto;">
            <h2>${escapeHtml(model)} 详细数据</h2>
            <pre style="background:rgba(0,0,0,0.5); padding:1rem; border-radius:12px; font-size:0.7rem; font-family:var(--font-mono); color:#ccc; white-space:pre-wrap; word-break:break-all;">${escapeHtml(JSON.stringify(detail, null, 2))}</pre>
            <button class="btn-primary" onclick="this.closest('.modal-overlay').remove()" style="margin-top:1rem;">关闭</button>
          </div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      };

      async function fetchWithTimeout(url, options, sec = 45) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), sec * 1000);
        try {
          const resp = await fetch(url, { ...options, signal: ctrl.signal });
          clearTimeout(timer);
          return resp;
        } catch (e) {
          clearTimeout(timer);
          throw e.name === 'AbortError' ? new Error('超时') : e;
        }
      }

      async function testNonStream(model) {
        const key = randomKey();
        const lang = randomLang();
        const prompt = PROMPTS.nonStream[lang];
        const t0 = performance.now();
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: [prompt], stream: false, max_tokens: 100 })
        });
        const elapsed = performance.now() - t0;
        if (!resp.ok) {
          const txt = await resp.text().catch(() => '');
          return { success: false, elapsed, error: `${resp.status}`, detail: txt, lang, keyUsed: key };
        }
        const data = await resp.json();
        return { success: true, elapsed, content: data.choices?.[0]?.message?.content, usage: data.usage || null, lang, keyUsed: key };
      }

      async function testStream(model) {
        const key = randomKey();
        const lang = randomLang();
        const prompt = PROMPTS.stream[lang];
        const t0 = performance.now();
        let firstByte = null, content = '', chunks = 0, usage = null;
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: [prompt], stream: true, max_tokens: 100, stream_options: { include_usage: true } })
        }, 60);
        if (!resp.ok) {
          const txt = await resp.text().catch(() => '');
          return { success: false, elapsed: performance.now() - t0, error: `${resp.status}`, detail: txt, lang, keyUsed: key };
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (!firstByte) firstByte = performance.now() - t0;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const d = line.slice(5).trim();
            if (d === '[DONE]') continue;
            try { const j = JSON.parse(d); if (j.usage) usage = j.usage; const c = j.choices?.[0]?.delta?.content; if (c) content += c; chunks++; } catch {}
          }
        }
        return { success: true, elapsed: performance.now() - t0, firstByte, content, chunks, usage, lang, keyUsed: key };
      }

      async function testToolCall(model) {
        const key = randomKey();
        const lang = randomLang();
        const prompt = PROMPTS.toolCall[lang];
        const t0 = performance.now();
        const resp = await fetchWithTimeout(API_BASE + '/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: [prompt], tools: [{ type: 'function', function: { name: 'get_weather', parameters: { type: 'object', properties: { city: { type: 'string' } }, required: ['city'] } } }], tool_choice: 'auto', stream: false })
        });
        const elapsed = performance.now() - t0;
        if (!resp.ok) {
          const txt = await resp.text().catch(() => '');
          return { success: false, elapsed, error: `${resp.status}`, detail: txt, lang, keyUsed: key };
        }
        const data = await resp.json();
        const hasTools = !!data.choices?.[0]?.message?.tool_calls;
        const toolCalls = data.choices?.[0]?.message?.tool_calls;
        return { success: true, elapsed, hasTools, toolCalls, usage: data.usage || null, content: data.choices?.[0]?.message?.content, lang, keyUsed: key };
      }

      async function runSingleModelTests(model) {
        const res = { nonStream: null, stream: null, toolCall: null };
        try { res.nonStream = await testNonStream(model); } catch (e) { res.nonStream = { success: false, error: e.message }; }
        try { res.stream = await testStream(model); } catch (e) { res.stream = { success: false, error: e.message }; }
        try { res.toolCall = await testToolCall(model); } catch (e) { res.toolCall = { success: false, error: e.message }; }
        return res;
      }

      async function refreshModels() {
        const key = randomKey();
        try {
          const resp = await fetch(API_BASE + '/models', { headers: { 'Authorization': `Bearer ${key}` } });
          if (!resp.ok) throw new Error('模型列表获取失败');
          const data = await resp.json();
          let list = data?.data ? data.data.map(m => m.id || m) : [];
          state.models = [...new Set(list.filter(Boolean))].map(id => ({ id }));
          updateModelStatusView();
        } catch (e) {}
      }

      async function runFullTest() {
        if (state.isRunning) return;
        state.isRunning = true;
        resultsBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#aaa;">正在从 nonwaste.cn 获取模型列表…</td></tr>';
        await refreshModels();
        if (!state.models.length) {
          resultsBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#e88488;">未能获取模型列表，请检查 API 连接。</td></tr>';
          state.isRunning = false;
          return;
        }
        resultsBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#aaa;">模型列表已就绪，开始随机中英文实际调用测试…</td></tr>';
        const models = state.models.map(m => m.id);
        for (const model of models) {
          const res = await runSingleModelTests(model);
          state.results[model] = res;
          renderResultsTable();
          updateSummary();
          updateModelStatusView();
          await new Promise(r => setTimeout(r, 300));
        }
        state.isRunning = false;
      }

      if (checkAccessCooldown()) {
        runFullTest().catch(console.error);
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>API 全能力测试 · 流式 / 非流式 / 工具调用</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(24, 24, 26, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 12px 38px rgba(0, 0, 0, 0.35);
      --blur: 20px;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-muted: #707070;
      --surface: rgba(255, 255, 255, 0.04);
      --accent: #f0f0f0;
      --success: #6ecf8a;
      --danger: #e0676b;
      --warning: #d4a853;
      --info: #7fb7d4;
      --radius: 18px;
      --radius-sm: 10px;
      --transition-smooth: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
      --transition-fast: 0.2s ease;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(145deg, #0e0e10 0%, #1a1a1d 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.4;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.01em;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
      transition: box-shadow 0.4s ease, border-color 0.3s;
    }

    .glass-panel:hover {
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .container {
      max-width: 1180px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.4rem 2rem;
      backdrop-filter: blur(26px);
      background: rgba(18, 18, 20, 0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 1.2rem;
      font-weight: 500;
      color: #ddd;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .logo-mark span {
      font-size: 1.4rem;
      font-weight: 300;
    }

    .logo-text h1 {
      font-weight: 550;
      font-size: 1.25rem;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .logo-text .sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 400;
    }

    .badge {
      background: rgba(255, 255, 255, 0.04);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 450;
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.12);
      letter-spacing: 0.3px;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 2fr auto;
      gap: 1.2rem;
      align-items: end;
      padding: 1.8rem 2rem;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .input-group label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 2px;
    }

    .input-field {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-size: 0.88rem;
      color: #eee;
      font-family: var(--font-mono);
      transition: all var(--transition-smooth);
      backdrop-filter: blur(6px);
      width: 100%;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.05);
    }

    .input-field::placeholder {
      color: #555;
    }

    /* Buttons */
    .btn {
      padding: 0.7rem 1.3rem;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.82rem;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      color: #e0e0e0;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: all var(--transition-smooth);
      letter-spacing: 0.2px;
      white-space: nowrap;
      font-family: inherit;
      line-height: 1;
    }

    .btn-primary {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.25);
      font-weight: 500;
    }

    .btn-primary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.4);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(20%);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-outline:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.45);
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.74rem;
      border-radius: 8px;
    }

    /* Model tags */
    .model-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      padding: 1rem 2rem;
      max-height: 210px;
      overflow-y: auto;
    }

    .model-tag {
      padding: 0.4rem 0.9rem;
      border-radius: 16px;
      font-size: 0.78rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #bbb;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      backdrop-filter: blur(4px);
    }

    .model-tag.selected {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    .model-tag .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #555;
      transition: background 0.2s;
    }

    .model-tag.selected .dot {
      background: #ddd;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* Progress */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex: 1;
      min-width: 180px;
    }

    .progress-bar {
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      flex: 1;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7a7a7a, #c0c0c0);
      border-radius: 8px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      min-width: 65px;
      text-align: right;
      font-weight: 450;
    }

    /* Summary */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
      gap: 0.8rem;
      padding: 1rem 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 0.9rem 0.6rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.7rem;
      font-weight: 600;
      color: #ddd;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 450;
    }

    /* Table */
    .table-container {
      overflow-x: auto;
      padding: 1rem 2rem;
      -webkit-overflow-scrolling: touch;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .results-table th {
      text-align: left;
      padding: 0.7rem 0.8rem;
      font-weight: 500;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.2);
    }

    .results-table td {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #ccc;
      vertical-align: middle;
    }

    .results-table tbody tr {
      transition: background 0.2s;
    }

    .results-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .model-name-cell {
      font-weight: 500;
      color: #eee;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.15rem 0.6rem;
      border-radius: 16px;
      font-size: 0.68rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.06);
      letter-spacing: 0.2px;
    }

    .status-pass {
      background: rgba(110, 207, 138, 0.12);
      color: #8fdda0;
    }

    .status-fail {
      background: rgba(224, 103, 107, 0.15);
      color: #e88488;
    }

    .status-warn {
      background: rgba(212, 168, 83, 0.1);
      color: #dbb862;
    }

    .clickable {
      cursor: pointer;
      color: #aaa;
      transition: color 0.2s;
      font-size: 0.9rem;
    }

    .clickable:hover {
      color: #fff;
    }

    .copy-err-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #999;
      padding: 1px 5px;
      border-radius: 5px;
      font-size: 0.6rem;
      cursor: pointer;
      margin-left: 4px;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .copy-err-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ddd;
    }

    .token-info {
      font-size: 0.62rem;
      color: #888;
      margin-left: 4px;
      font-weight: 400;
    }

    .retry-info {
      font-size: 0.6rem;
      color: #c9a84b;
      margin-left: 2px;
    }

    /* Mobile cards */
    @media (max-width: 750px) {
      .table-container {
        padding: 0.8rem;
      }
      .results-table thead {
        display: none;
      }
      .results-table,
      .results-table tbody,
      .results-table tr,
      .results-table td {
        display: block;
        width: 100%;
      }
      .results-table tr {
        margin-bottom: 1rem;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 14px;
        padding: 0.8rem 0.7rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .results-table td {
        border-bottom: none;
        padding: 0.3rem 0.3rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.76rem;
      }
      .results-table td::before {
        content: attr(data-label);
        font-weight: 500;
        color: #888;
        text-transform: uppercase;
        font-size: 0.62rem;
        letter-spacing: 0.4px;
        margin-right: 0.8rem;
      }
      .model-name-cell {
        font-size: 0.85rem;
        font-weight: 550;
        justify-content: flex-start;
      }
      .model-name-cell::before {
        display: none;
      }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    .modal-content {
      background: rgba(26, 26, 28, 0.9);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.8rem;
      max-width: 680px;
      width: 92%;
      max-height: 82vh;
      overflow-y: auto;
      color: #ddd;
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.7);
    }

    .modal-content pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem;
      border-radius: 12px;
      font-size: 0.7rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: var(--font-mono);
      color: #bbb;
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: #fff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ccc;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Toast */
    .toast-area {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      padding: 0.7rem 1.2rem;
      border-radius: 10px;
      background: rgba(22, 22, 24, 0.85);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ddd;
      font-size: 0.78rem;
      font-weight: 450;
      animation: toastIn 0.35s ease, toastOut 0.3s 2.8s forwards;
      pointer-events: auto;
      letter-spacing: 0.2px;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(60px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-8px);
      }
    }

    /* Tip text */
    .hint {
      font-size: 0.65rem;
      color: #5a5a5a;
      padding: 0.2rem 2rem 0.6rem;
      letter-spacing: 0.2px;
    }

    @media (max-width: 500px) {
      .action-row {
        flex-direction: column;
        align-items: stretch;
      }
      .progress-wrap {
        width: 100%;
      }
      .header {
        padding: 1rem 1.2rem;
      }
      .glass-panel {
        border-radius: 14px;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="glass-panel header">
      <div class="logo">
        <div class="logo-mark"><span>&#x25C7;</span></div>
        <div class="logo-text">
          <h1>API 全能力测试</h1>
          <div class="sub">非流式 · 流式 · 工具调用</div>
        </div>
      </div>
      <div class="badge">OpenAI 兼容</div>
    </div>

    <!-- Config -->
    <div class="glass-panel">
      <div class="form-grid">
        <div class="input-group">
          <label>API Base URL</label>
          <input class="input-field" id="apiUrl" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
        </div>
        <div class="input-group">
          <label>API Key</label>
          <input class="input-field" type="password" id="apiKey" placeholder="sk-...">
        </div>
        <button class="btn btn-primary" id="btnFetchModels" onclick="fetchModels()">获取模型</button>
      </div>
    </div>

    <!-- Models -->
    <div class="glass-panel" id="modelsCard" style="display:none;">
      <div class="action-row">
        <span style="font-weight:500;color:#ccc;font-size:0.88rem;" id="modelCountLabel">模型列表</span>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" onclick="selectAllModels()">全选</button>
          <button class="btn btn-outline btn-sm" onclick="deselectAllModels()">清空</button>
          <button class="btn btn-outline btn-sm" onclick="invertSelection()">反选</button>
        </div>
      </div>
      <div class="model-cloud" id="modelsContainer"></div>
    </div>

    <!-- Control -->
    <div class="glass-panel" id="testControlCard" style="display:none;">
      <div class="action-row">
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span class="progress-label" id="progressLabel">就绪</span>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-primary" id="btnStart" onclick="startAllTests()">开始测试</button>
          <button class="btn btn-outline btn-sm" id="btnStop" onclick="stopAllTests()" disabled>停止</button>
          <button class="btn btn-outline btn-sm" onclick="clearResults()">清除</button>
        </div>
      </div>
      <div style="padding:0.5rem 2rem;display:flex;gap:1.5rem;font-size:0.75rem;color:#aaa;flex-wrap:wrap;align-items:center;">
        <span>超时 <input class="input-field" id="timeoutSec" type="number" value="60" min="10" style="width:55px;padding:0.3rem;text-align:center;"> s</span>
        <span>并发 <input class="input-field" id="concurrency" type="number" value="2" min="1" max="6" style="width:45px;padding:0.3rem;text-align:center;"></span>
        <span>间隔 <input class="input-field" id="requestInterval" type="number" value="800" min="200" max="5000" step="100" style="width:60px;padding:0.3rem;text-align:center;"> ms</span>
        <span>重试 <input class="input-field" id="maxRetries" type="number" value="3" min="0" max="5" style="width:40px;padding:0.3rem;text-align:center;"></span>
      </div>
      <div class="hint">请求间隔与指数退避重试可缓解429限流。</div>
    </div>

    <!-- Summary -->
    <div class="glass-panel" id="summaryCard" style="display:none;">
      <div class="action-row" style="padding-bottom:0;">
        <span style="color:#ccc;font-weight:500;font-size:0.9rem;">测试汇总</span>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" onclick="copyAllErrors()">复制错误</button>
          <button class="btn btn-outline btn-sm" onclick="exportResults()">导出 JSON</button>
        </div>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="sumTotal">0</div><div class="stat-label">总计</div></div>
        <div class="stat-card"><div class="stat-value" id="sumPass" style="color:#8fdda0;">0</div><div class="stat-label">通过</div></div>
        <div class="stat-card"><div class="stat-value" id="sumFail" style="color:#e88488;">0</div><div class="stat-label">失败</div></div>
        <div class="stat-card"><div class="stat-value" id="sumRateLimit" style="color:#dbb862;">0</div><div class="stat-label">限流</div></div>
        <div class="stat-card"><div class="stat-value" id="sumTokens" style="color:#9ac4da;">0</div><div class="stat-label">Tokens</div></div>
        <div class="stat-card"><div class="stat-value" id="sumModels" style="color:#eee;">0</div><div class="stat-label">模型</div></div>
      </div>
    </div>

    <!-- Results -->
    <div class="glass-panel" id="resultsCard" style="display:none;">
      <div class="table-container">
        <table class="results-table">
          <thead>
            <tr>
              <th>模型</th>
              <th>非流式</th>
              <th>耗时</th>
              <th>流式</th>
              <th>首字节</th>
              <th>总耗时</th>
              <th>工具调用</th>
              <th>耗时</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast-area" id="toastArea"></div>

  <script>
    (function() {
      const state = {
        models: [],
        results: {},
        running: false,
        totalTests: 0,
        completed: 0,
        globalLastRequestTime: 0,
        rateLimitCount: 0,
      };

      const $ = (s) => document.querySelector(s);
      const apiUrlInp = $('#apiUrl');
      const apiKeyInp = $('#apiKey');
      const modelsCard = $('#modelsCard');
      const modelsContainer = $('#modelsContainer');
      const modelCountLabel = $('#modelCountLabel');
      const testControlCard = $('#testControlCard');
      const progressFill = $('#progressFill');
      const progressLabel = $('#progressLabel');
      const btnStart = $('#btnStart');
      const btnStop = $('#btnStop');
      const summaryCard = $('#summaryCard');
      const resultsCard = $('#resultsCard');
      const resultsBody = $('#resultsBody');
      const sumTotal = $('#sumTotal');
      const sumPass = $('#sumPass');
      const sumFail = $('#sumFail');
      const sumRateLimit = $('#sumRateLimit');
      const sumTokens = $('#sumTokens');
      const sumModels = $('#sumModels');
      const toastArea = $('#toastArea');
      const timeoutSecInp = $('#timeoutSec');
      const concurrencyInp = $('#concurrency');
      const requestIntervalInp = $('#requestInterval');
      const maxRetriesInp = $('#maxRetries');

      function showToast(msg, type = 'info') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toastArea.appendChild(toast);
        setTimeout(() => toast.remove(), 3200);
      }

      function normalizeUrl(url) {
        let u = url.trim().replace(/\/+$/, '');
        if (!u.endsWith('/v1')) u += '/v1';
        return u;
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      function escapeAttr(str) {
        return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function cssEscape(str) {
        if (typeof CSS !== 'undefined' && CSS.escape) return CSS.escape(str);
        return ('' + str).replace(/[^a-zA-Z0-9\-_]/g, c => '\\' + c.charCodeAt(0).toString(16).padStart(6, '0'));
      }

      function formatTime(ms) {
        if (ms == null || ms < 0) return '—';
        if (ms < 1000) return Math.round(ms) + 'ms';
        return (ms / 1000).toFixed(1) + 's';
      }

      function isRateLimitError(msg) { return /429|rate.?limit|too.?many/i.test(msg || ''); }

      function isRetryableError(msg, code) {
        if (code && (code === 429 || code === 503 || code === 502)) return true;
        return /429|503|502|rate.?limit|too.?many|service.?unavailable|bad.?gateway/i.test(msg || '');
      }

      async function waitForRateLimit() {
        if (!state.running) return;
        const interval = parseInt(requestIntervalInp.value) || 800;
        const now = Date.now();
        const elapsed = now - state.globalLastRequestTime;
        if (elapsed < interval && state.globalLastRequestTime > 0) {
          await new Promise(r => setTimeout(r, interval - elapsed));
        }
        state.globalLastRequestTime = Date.now();
      }

      async function fetchWithTimeout(url, options, sec) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), sec * 1000);
        try {
          const resp = await fetch(url, { ...options, signal: ctrl.signal });
          clearTimeout(timer);
          return resp;
        } catch (e) {
          clearTimeout(timer);
          throw e.name === 'AbortError' ? new Error('超时(' + sec + 's)') : e;
        }
      }

      async function callWithRetry(fn, maxRetries) {
        let last = null, detailAcc = '';
        for (let i = 0; i <= maxRetries; i++) {
          if (!state.running && i > 0) return { success: false, elapsed: 0, error: '已停止', retries: i };
          if (i > 0) {
            const delay = Math.min(1000 * Math.pow(2, i - 1), 28000) + Math.random() * 400;
            await new Promise(r => setTimeout(r, delay));
            if (!state.running) return { success: false, elapsed: 0, error: '已停止', retries: i };
          }
          try {
            const res = await fn();
            if (res.success) return { ...res, retries: i };
            const codeMatch = (res.error || '').match(/^(\d{3})/);
            const code = codeMatch ? parseInt(codeMatch[1]) : null;
            if (isRetryableError(res.error, code) && i < maxRetries) {
              if (isRateLimitError(res.error)) state.rateLimitCount++;
              detailAcc = res.detail || detailAcc;
              last = res;
              continue;
            }
            return { ...res, retries: i, detail: res.detail || detailAcc };
          } catch (e) {
            if (isRetryableError(e.message, null) && i < maxRetries) {
              if (isRateLimitError(e.message)) state.rateLimitCount++;
              last = { success: false, error: e.message };
              continue;
            }
            return { success: false, elapsed: 0, error: e.message, retries: i };
          }
        }
        return {
          success: false,
          elapsed: last?.elapsed || 0,
          error: (last?.error || '未知错误') + ` (重试${maxRetries}次)`,
          detail: detailAcc,
          retries: maxRetries
        };
      }

      async function callNonStream(base, key, model, timeout, retries) {
        return callWithRetry(async () => {
          await waitForRateLimit();
          const t0 = performance.now();
          const resp = await fetchWithTimeout(base + '/chat/completions', {
            method: 'POST',
            headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model, messages: [{ role: 'user', content: '你好，用一句话介绍自己。' }],
              stream: false, max_tokens: 100 })
          }, timeout);
          const elapsed = performance.now() - t0;
          if (!resp.ok) {
            const txt = await resp.text().catch(() => '');
            return { success: false, elapsed, error: `${resp.status} ${resp.statusText}`, detail: txt };
          }
          const data = await resp.json();
          return { success: true, elapsed, content: data.choices?.[0]?.message?.content, usage: data.usage || null };
        }, retries);
      }

      async function callStream(base, key, model, timeout, retries) {
        const doStream = async (withUsage) => {
          await waitForRateLimit();
          const t0 = performance.now();
          let firstByte = null, content = '', chunks = 0, usage = null;
          const body = { model, messages: [{ role: 'user', content: '一句话介绍人工智能。' }], stream: true,
            max_tokens: 100 };
          if (withUsage) body.stream_options = { include_usage: true };
          const resp = await fetchWithTimeout(base + '/chat/completions', {
            method: 'POST',
            headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          }, timeout);
          if (!resp.ok) {
            const txt = await resp.text().catch(() => '');
            const err = new Error(`${resp.status} ${resp.statusText}`);
            err.status = resp.status;
            err.detail = txt;
            err.isHttp = true;
            throw err;
          }
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            if (!firstByte) firstByte = performance.now() - t0;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data:')) continue;
              const d = line.slice(5).trim();
              if (d === '[DONE]') continue;
              try { const j = JSON.parse(d); if (j.usage) usage = j.usage; const c = j.choices?.[0]?.delta
                  ?.content; if (c) content += c;
                chunks++; } catch {}
            }
          }
          return { success: true, elapsed: performance.now() - t0, firstByte, content, chunks, usage };
        };
        return callWithRetry(async () => {
          try { return await doStream(true); } catch (e) {
            if (e.isHttp && (e.status === 400 || e.status === 404 || e.status === 501)) {
              try { return await doStream(false); } catch (e2) {
                return { success: false, elapsed: 0, error: e2.isHttp ? `${e2.status}` : e2.message, detail: e2
                    .detail || '' };
              }
            }
            return { success: false, elapsed: 0, error: e.isHttp ? `${e.status}` : e.message, detail: e.detail ||
                '' };
          }
        }, retries);
      }

      async function callTool(base, key, model, timeout, retries) {
        return callWithRetry(async () => {
          await waitForRateLimit();
          const t0 = performance.now();
          const resp = await fetchWithTimeout(base + '/chat/completions', {
            method: 'POST',
            headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model,
              messages: [{ role: 'user', content: '北京天气如何？' }],
              tools: [{ type: 'function', function: { name: 'get_weather', parameters: { type: 'object',
                    properties: { city: { type: 'string' } }, required: ['city'] } } }],
              tool_choice: 'auto',
              stream: false
            })
          }, timeout);
          const elapsed = performance.now() - t0;
          if (!resp.ok) {
            const txt = await resp.text().catch(() => '');
            return { success: false, elapsed, error: `${resp.status} ${resp.statusText}`, detail: txt };
          }
          const data = await resp.json();
          return {
            success: true,
            elapsed,
            hasTools: !!data.choices?.[0]?.message?.tool_calls,
            usage: data.usage || null,
            content: data.choices?.[0]?.message?.content
          };
        }, retries);
      }

      function tokenLabel(usage) {
        if (!usage || usage.total_tokens == null) return '';
        const t = usage.total_tokens;
        const p = usage.prompt_tokens;
        const c = usage.completion_tokens;
        let title = `共${t}`;
        if (p != null) title += ` 提示${p}`;
        if (c != null) title += ` 生成${c}`;
        return `<span class="token-info" title="${title}">${t} tk</span>`;
      }

      function retryLabel(n) {
        if (!n) return '';
        return `<span class="retry-info">&#x21bb;${n}</span>`;
      }

      function renderRow(model, res) {
        const n = res.nonStream || {}, s = res.stream || {}, t = res.toolCall || {};
        const esc = escapeAttr(model), css = cssEscape(model);
        const non = n.success ?
          `<span class="status-badge status-pass">通过</span>${tokenLabel(n.usage)}${retryLabel(n.retries)}` :
          `<span class="status-badge status-fail">失败</span>${retryLabel(n.retries)}${n.error?` <button class="copy-err-btn" onclick="event.stopPropagation();copyText('${escapeAttr(n.error+(n.detail?' | '+n.detail:''))}')">复制</button>`:''}`;
        const str = s.success ?
          `<span class="status-badge status-pass">通过</span>${tokenLabel(s.usage)}${retryLabel(s.retries)}` :
          `<span class="status-badge status-fail">失败</span>${retryLabel(s.retries)}${s.error?` <button class="copy-err-btn" onclick="event.stopPropagation();copyText('${escapeAttr(s.error+(s.detail?' | '+s.detail:''))}')">复制</button>`:''}`;
        const tool = t.success ?
          (t.hasTools ? `<span class="status-badge status-pass">已调用</span>` :
            '<span class="status-badge status-warn">未调用</span>') + tokenLabel(t.usage) + retryLabel(t.retries) :
          `<span class="status-badge status-fail">失败</span>${retryLabel(t.retries)}${t.error?` <button class="copy-err-btn" onclick="event.stopPropagation();copyText('${escapeAttr(t.error+(t.detail?' | '+t.detail:''))}')">复制</button>`:''}`;

        return `<tr id="row-${css}" data-model="${esc}"><td class="model-name-cell" data-label="模型">${escapeHtml(model)}</td>
          <td data-label="非流式">${non}</td><td data-label="耗时">${formatTime(n.elapsed)}</td>
          <td data-label="流式">${str}</td><td data-label="首字节">${formatTime(s.firstByte)}</td><td data-label="总耗时">${formatTime(s.elapsed)}</td>
          <td data-label="工具调用">${tool}</td><td data-label="耗时">${formatTime(t.elapsed)}</td>
          <td data-label="详情"><span class="clickable" onclick="showDetail('${esc}')">&#x2192;</span></td></tr>`;
      }

      window.copyText = async (text) => {
        try { await navigator.clipboard.writeText(text);
          showToast('已复制'); } catch { showToast('复制失败'); }
      };
      window.showDetail = (model) => {
        const r = state.results[model];
        if (!r) return;
        const json = JSON.stringify({ model, ...r }, null, 2);
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal-content"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button><h3 style="margin-top:0;font-weight:500;">${escapeHtml(model)}</h3><pre>${escapeHtml(json)}</pre><button class="btn btn-sm btn-outline" style="margin-top:1rem;" onclick="navigator.clipboard.writeText(this.getAttribute('data-json'))" data-json="${escapeAttr(json)}">复制 JSON</button></div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      };
      window.copyAllErrors = async () => {
        const arr = [];
        for (const [m, r] of Object.entries(state.results))
          for (const [k, v] of Object.entries(r))
            if (v && !v.success) arr.push(`[${m}] ${k}: ${v.error||'?'}${v.detail?' | '+v.detail:''}${v.retries?' 重试'+v.retries:''}`);
        if (!arr.length) return showToast('无错误');
        try { await navigator.clipboard.writeText(arr.join('\n\n'));
          showToast(`已复制 ${arr.length} 条`); } catch { showToast('复制失败'); }
      };
      window.exportResults = () => {
        if (!Object.keys(state.results).length) return showToast('无数据');
        const data = { time: new Date().toISOString(), base: normalizeUrl(apiUrlInp.value.trim()),
          tokens: getTotalTokens(), rateLimits: state.rateLimitCount, results: state.results };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `api-test-${Date.now()}.json`;
        a.click();
        showToast('已导出');
      };

      function getTotalTokens() {
        let sum = 0;
        for (const r of Object.values(state.results))
          for (const k of ['nonStream', 'stream', 'toolCall'])
            if (r[k]?.usage?.total_tokens) sum += r[k].usage.total_tokens;
        return sum;
      }

      function updateSummary() {
        let total = 0,
          pass = 0,
          fail = 0;
        const models = new Set();
        for (const [m, r] of Object.entries(state.results)) {
          models.add(m);
          for (const k of ['nonStream', 'stream', 'toolCall']) { if (r[k]) { total++;
              r[k].success ? pass++ : fail++; } }
        }
        sumTotal.textContent = total;
        sumPass.textContent = pass;
        sumFail.textContent = fail;
        sumRateLimit.textContent = state.rateLimitCount;
        sumTokens.textContent = getTotalTokens();
        sumModels.textContent = models.size;
        if (total) summaryCard.style.display = '';
      }

      function updateProgress() {
        const pct = state.totalTests ? Math.round((state.completed / state.totalTests) * 100) : 0;
        progressFill.style.width = pct + '%';
        progressLabel.textContent = `${state.completed}/${state.totalTests}`;
      }

      function refreshRow(model) {
        const row = document.getElementById(`row-${cssEscape(model)}`);
        if (row) row.outerHTML = renderRow(model, state.results[model]);
        else resultsBody.insertAdjacentHTML('beforeend', renderRow(model, state.results[model]));
        updateSummary();
      }

      async function startAllTests() {
        if (state.running) return;
        const selected = getSelected();
        if (!selected.length) return showToast('请选择模型');
        const base = normalizeUrl(apiUrlInp.value.trim());
        const key = apiKeyInp.value.trim();
        if (!base || !key) return showToast('配置不完整');
        const timeout = Math.max(10, parseInt(timeoutSecInp.value) || 60);
        const concurrency = Math.min(6, Math.max(1, parseInt(concurrencyInp.value) || 2));
        const retries = Math.min(5, Math.max(0, parseInt(maxRetriesInp.value) || 3));
        state.running = true;
        state.results = {};
        state.totalTests = selected.length * 3;
        state.completed = 0;
        state.rateLimitCount = 0;
        state.globalLastRequestTime = 0;
        updateProgress();
        btnStart.disabled = true;
        btnStop.disabled = false;
        resultsCard.style.display = '';
        resultsBody.innerHTML = selected.map(m => renderRow(m, {})).join('');
        updateSummary();
        const queue = [...selected];
        const workers = new Set();
        const processModel = async (model) => {
          const r = { nonStream: null, stream: null, toolCall: null };
          r.nonStream = await callNonStream(base, key, model, timeout, retries);
          state.completed++;
          updateProgress();
          state.results[model] = r;
          refreshRow(model);
          if (!state.running) return;
          r.stream = await callStream(base, key, model, timeout, retries);
          state.completed++;
          updateProgress();
          state.results[model] = r;
          refreshRow(model);
          if (!state.running) return;
          r.toolCall = await callTool(base, key, model, timeout, retries);
          state.completed++;
          updateProgress();
          state.results[model] = r;
          refreshRow(model);
        };
        while (queue.length && state.running) {
          const m = queue.shift();
          const p = processModel(m).finally(() => workers.delete(p));
          workers.add(p);
          if (workers.size >= concurrency) await Promise.race(workers);
        }
        await Promise.all(workers);
        state.running = false;
        btnStart.disabled = false;
        btnStop.disabled = true;
        updateSummary();
      }

      window.startAllTests = startAllTests;
      window.stopAllTests = () => { state.running = false;
        btnStop.disabled = true;
        btnStart.disabled = false;
        showToast('已停止'); };
      window.clearResults = () => {
        state.results = {};
        state.totalTests = state.completed = state.rateLimitCount = 0;
        updateProgress();
        resultsBody.innerHTML = '';
        resultsCard.style.display = 'none';
        summaryCard.style.display = 'none';
      };

      function renderModelTags() {
        modelsContainer.innerHTML = state.models.map((m, i) =>
          `<div class="model-tag ${m.selected?'selected':''}" onclick="toggleModel(${i})"><span class="dot"></span>${escapeHtml(m.id)}</div>`
        ).join('');
      }
      window.toggleModel = (i) => { state.models[i].selected = !state.models[i].selected;
        renderModelTags(); };
      window.selectAllModels = () => { state.models.forEach(m => m.selected = true);
        renderModelTags(); };
      window.deselectAllModels = () => { state.models.forEach(m => m.selected = false);
        renderModelTags(); };
      window.invertSelection = () => { state.models.forEach(m => m.selected = !m.selected);
        renderModelTags(); };

      function getSelected() { return state.models.filter(m => m.selected).map(m => m.id); }

      async function fetchModels() {
        const raw = apiUrlInp.value.trim(),
          key = apiKeyInp.value.trim();
        if (!raw || !key) return showToast('请输入URL和Key');
        const base = normalizeUrl(raw);
        const btn = $('#btnFetchModels');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 获取中';
        try {
          const resp = await fetch(base + '/models', { headers: { Authorization: `Bearer ${key}` } });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          let list = data?.data ? data.data.map(m => m.id || m) : Array.isArray(data) ? data.map(m => m.id || m) : [];
          state.models = [...new Set(list.filter(Boolean))].map(id => ({ id, selected: true }));
          renderModelTags();
          modelsCard.style.display = '';
          testControlCard.style.display = '';
          modelCountLabel.textContent = `模型列表 (${state.models.length})`;
          showToast(`已加载 ${state.models.length} 个模型`);
        } catch (e) { showToast('获取失败: ' + e.message); } finally { btn.disabled = false;
          btn.textContent = '获取模型'; }
      }
      window.fetchModels = fetchModels;
      document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e
          .preventDefault();
          state.running ? window.stopAllTests() : window.startAllTests(); } });
    })();
  </script>
</body>
</html>
